  <title>下载 — HNUST Python 考试仿真平台</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ================================================
       FONT-FACE (Self-hosted PingFang)
       ================================================ */
    @font-face {
      font-family: 'PingFang SC';
      src: local('PingFang SC'), local('PingFangSC-Regular'),
           url('./fonts/PingFangRegular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'PingFang SC';
      src: local('PingFang SC Medium'), local('PingFangSC-Medium'),
           url('./fonts/PingFangMedium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'PingFang SC';
      src: local('PingFang SC Semibold'), local('PingFangSC-Semibold'),
           url('./fonts/PingFangBold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    /* ================================================
       CUSTOM PROPERTIES
       ================================================ */
    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.1);
      --primary: #8b5cf6;
      --primary-rgb: 139,92,246;
      --accent: #22d3ee;
      --accent-rgb: 34,211,238;
      --text: #f0ece4;
      --text-muted: rgba(240,236,228,0.55);
      --text-dim: rgba(240,236,228,0.25);
      --green: #86efac;
      --yellow: #fde047;
      --red: #f87171;
      --font-display: 'Syne', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-body: 'Outfit', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    /* RESET */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-body);
      overflow-x: hidden; line-height: 1.6;
      font-synthesis: none; text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    button { border: none; background: none; font: inherit; color: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }

    /* Noise overlay */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 10000; opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

    /* Background */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
    .orb-1 {
      width: 600px; height: 600px; top: -10%; right: -10%;
      background: radial-gradient(circle, rgba(var(--primary-rgb), 0.2) 0%, transparent 70%);
      animation: orb-float-1 20s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px; bottom: -5%; left: -10%;
      background: radial-gradient(circle, rgba(var(--accent-rgb), 0.12) 0%, transparent 70%);
      animation: orb-float-2 25s ease-in-out infinite;
    }

    /* Cursor glow */
    #cursor-glow {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      pointer-events: none; z-index: 1; will-change: transform;
      background: radial-gradient(circle, rgba(var(--primary-rgb), 0.1) 0%, transparent 70%);
      filter: blur(60px); transform: translate(-500px, -500px);
    }
    @media (hover: none) { #cursor-glow { display: none; } }

    /* LAYOUT */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* COMPONENTS: BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 999px; font-weight: 500; font-size: 0.95rem;
      transition: transform 0.25s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.3s ease, background 0.3s ease, letter-spacing 0.3s ease;
      white-space: nowrap; position: relative; overflow: hidden;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff;
      box-shadow: 0 4px 24px rgba(var(--primary-rgb), 0.3);
    }
    .btn-primary:hover { box-shadow: 0 8px 32px rgba(var(--primary-rgb), 0.5); letter-spacing: 0.02em; }
    .btn-outline {
      border: 1px solid var(--border-light);
      background: var(--surface);
      color: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
    }
    .btn-outline:hover { border-color: rgba(var(--primary-rgb), 0.3); background: rgba(var(--primary-rgb), 0.05); }
    .btn-lg { padding: 16px 36px; font-size: 1.05rem; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text-muted); transition: color 0.3s ease, transform 0.3s ease;
      padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface);
    }
    .back-link:hover { color: var(--primary); transform: translateX(-4px); border-color: rgba(var(--primary-rgb), 0.3); }

    /* Icon helpers */
    .icon { width: 1em; height: 1em; display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-md { width: 20px; height: 20px; }

    /* ================================================
       PAGE LAYOUT
       ================================================ */
    .page-wrapper {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px 80px; position: relative; z-index: 2;
    }

    /* ================================================
       DOWNLOAD CARD
       ================================================ */
    .dl-card {
      max-width: 620px; width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 28px; padding: 48px 40px;
      position: relative; overflow: hidden;
      backdrop-filter: blur(12px);
      animation: card-enter 0.8s cubic-bezier(.22,1,.36,1) both;
    }
    .dl-card::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 0%, rgba(var(--primary-rgb), 0.1), transparent 60%);
    }
    .dl-card > * { position: relative; z-index: 1; }

    .dl-header { text-align: center; margin-bottom: 32px; }
    .dl-header h1 {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1.5rem, 3vw + 0.5rem, 2.2rem);
      margin-bottom: 8px;
    }
    .dl-header p { color: var(--text-muted); font-size: 0.95rem; }

    /* Version info grid */
    .dl-info {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 32px;
    }
    .dl-info-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      text-align: center;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }
    .dl-info-item:hover { border-color: rgba(var(--primary-rgb), 0.3); transform: translateY(-2px); }
    .dl-info-label {
      font-family: var(--font-mono); font-size: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); margin-bottom: 8px;
    }
    .dl-info-value {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.25rem;
    }
    .dl-info-value.version { color: var(--primary); }
    .dl-info-value.date { color: var(--accent); font-family: var(--font-mono); font-weight: 600; }

    /* Loading / error states */
    .dl-loading {
      text-align: center; padding: 32px 0;
      font-family: var(--font-mono); font-size: 0.85rem;
      color: var(--text-dim);
    }
    .dl-loading .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 2px solid transparent;
      border-top-color: var(--primary); border-right-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    .dl-error {
      text-align: center; padding: 16px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 12px; margin-bottom: 24px;
      font-size: 0.85rem; color: var(--red);
    }

    /* Download button */
    .dl-btn-wrap { text-align: center; }
    .dl-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 18px 32px; border-radius: 16px;
      font-weight: 600; font-size: 1.05rem;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 4px 24px rgba(var(--primary-rgb), 0.3);
      transition: transform 0.25s cubic-bezier(.175,.885,.32,1.275), box-shadow 0.3s ease;
      animation: pulse-glow 3s ease-in-out infinite;
      font-family: var(--font-body);
    }
    .dl-btn:hover { transform: scale(1.03); box-shadow: 0 8px 40px rgba(var(--primary-rgb), 0.5); }
    .dl-btn:active { transform: scale(0.97); }
    .dl-btn.disabled {
      opacity: 0.5; cursor: not-allowed; animation: none;
      pointer-events: none;
    }

    .dl-note {
      text-align: center; margin-top: 16px;
      font-size: 0.78rem; color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* ================================================
       GALLERY SECTION
       ================================================ */
    .gallery {
      max-width: 620px; width: 100%; margin-top: 48px;
      animation: card-enter 0.8s cubic-bezier(.22,1,.36,1) 0.15s both;
    }
    .gallery-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1.15rem; margin-bottom: 20px; text-align: center;
    }
    .gallery-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    .gallery-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; cursor: zoom-in;
      transition: border-color 0.3s ease;
    }
    .gallery-item:hover { border-color: rgba(var(--primary-rgb), 0.3); }
    .gallery-img {
      width: 100%; aspect-ratio: 16/10; object-fit: contain; padding: 4px;
      background: rgba(255,255,255,0.03);
      transition: transform 0.4s cubic-bezier(.175,.885,.32,1.275);
      position: relative; z-index: 1;
    }
    .gallery-img.zoomed {
      transform: scale(2.5);
      z-index: 100;
      position: relative;
    }
    .gallery-img-placeholder {
      width: 100%; aspect-ratio: 16/10;
      background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.08), rgba(var(--accent-rgb), 0.05));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: var(--text-dim);
      font-family: var(--font-mono); text-align: center; padding: 8px;
    }
    .gallery-caption {
      padding: 12px; font-size: 0.8rem; color: var(--text-muted);
      text-align: center;
    }

    /* ================================================
       FOOTER
       ================================================ */
    .dl-footer {
      max-width: 620px; width: 100%; text-align: center;
      margin-top: 48px; padding-top: 32px;
      border-top: 1px solid var(--border);
      animation: card-enter 0.8s cubic-bezier(.22,1,.36,1) 0.3s both;
    }
    .dl-footer p {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: rgba(255,255,255,0.18);
    }
    .dl-footer .contributors {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 12px; font-size: 0.8rem; color: rgba(255,255,255,0.3);
    }
    .dl-footer .contributors .author {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.7); font-weight: 500;
    }
    .dl-footer .contributors img {
      width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
    }
    .dl-footer .contributors .sep {
      color: rgba(255,255,255,0.12);
    }
    .dl-footer .contributors a {
      color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .dl-footer .contributors a:hover {
      color: var(--primary); text-decoration: underline;
    }

    /* ================================================
       ANIMATIONS
       ================================================ */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes orb-float-1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(50px,-40px) scale(1.08); } 66% { transform: translate(-30px,30px) scale(0.95); } }
    @keyframes orb-float-2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-40px,30px) scale(0.92); } 66% { transform: translate(30px,-40px) scale(1.08); } }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.2); }
      50% { box-shadow: 0 0 40px rgba(var(--primary-rgb), 0.5), 0 0 80px rgba(var(--primary-rgb), 0.12); }
    }
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ================================================
       CHANGELOG — PYTHON CONSOLE
       ================================================ */
    .changelog-section {
      max-width: 620px; width: 100%; margin-top: 48px;
      animation: card-enter 0.8s cubic-bezier(.22,1,.36,1) 0.25s both;
    }
    .py-console {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      font-family: var(--font-mono);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .py-titlebar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .py-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .py-dot.r { background: #ff5f56; }
    .py-dot.y { background: #ffbd2e; }
    .py-dot.g { background: #27c93f; }
    .py-title-text {
      font-size: 0.7rem; color: var(--text-dim);
      letter-spacing: 0.03em;
    }
    .py-body {
      padding: 16px 20px; max-height: 440px;
      overflow-y: auto; position: relative;
    }
    .py-body::-webkit-scrollbar { width: 4px; }
    .py-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .py-line {
      white-space: pre-wrap; word-wrap: break-word;
      font-family: var(--font-mono);
      font-size: 0.78rem; line-height: 1.75;
      min-height: 1.75em;
    }
    .py-line .prompt { color: rgba(255,255,255,0.12); }
    .py-line.heading { color: rgba(255,255,255,0.35); }
    .py-line.version { color: #ffbd2e; font-weight: 600; }
    .py-line.feat { color: #86efac; }
    .py-line.fix { color: #f87171; }
    .py-line.opt { color: #60a5fa; }
    .py-line.major { color: #c084fc; }
    .py-cursor-span {
      display: inline-block;
      color: #86efac;
      animation: blink-cursor 0.7s step-end infinite;
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ================================================
       TILT CARD (synced from landing page)
       ================================================ */
    .tilt-wrapper {
      perspective: 1000px;
    }
    .tilt-inner {
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out;
      position: relative;
    }
    .tilt-inner::after {
      content: ''; position: absolute; inset: 0; border-radius: 28px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 20;
      background: radial-gradient(350px circle at var(--spec-x, 50%) var(--spec-y, 50%),
        rgba(255,255,255,0.09), transparent 50%);
    }
    .tilt-inner:hover::after { opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    /* ================================================
       ALTERNATIVE DOWNLOAD CARDS
       ================================================ */
    .alt-dl-section {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .alt-dl-divider {
      text-align: center; margin-bottom: 16px;
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .alt-dl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .alt-dl-card {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-align: center;
      transition: border-color 0.3s ease, transform 0.25s cubic-bezier(.175,.885,.32,1.275), background 0.3s ease;
      cursor: pointer;
    }
    .alt-dl-card:hover {
      border-color: rgba(var(--primary-rgb), 0.3);
      background: rgba(var(--primary-rgb), 0.05);
      transform: translateY(-2px);
    }
    .alt-dl-card:active {
      transform: scale(0.97);
    }
    .alt-dl-icon {
      font-size: 1.5rem; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      background: rgba(var(--primary-rgb), 0.08);
      border-radius: 10px;
      margin-bottom: 2px;
    }
    .alt-dl-icon svg {
      width: 20px; height: 20px;
    }
    .alt-dl-icon img {
      width: 22px; height: 22px; display: block;
    }
    .alt-dl-title {
      font-weight: 600; font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
    }
    .alt-dl-desc {
      font-size: 0.7rem; color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* ================================================
       RESPONSIVE
       ================================================ */
    @media (max-width: 640px) {
      .page-wrapper { padding: 40px 16px 60px; }
      .dl-card { padding: 32px 20px; }
      .dl-info { grid-template-columns: 1fr; gap: 12px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .btn-lg { padding: 14px 24px; font-size: 0.95rem; }
      .alt-dl-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
  (function() {
    'use strict';

    var API_URL = 'https://api.github.com/repos/RyanTanC/HNUST-Exam-System/releases/latest';
    var FALLBACK_URL = 'https://github.com/RyanTanC/HNUST-Exam-System/releases/latest';

    var loadingEl = document.getElementById('dl-loading');
    var errorEl   = document.getElementById('dl-error');
    var contentEl = document.getElementById('dl-content');
    var versionEl = document.getElementById('dl-version');
    var dateEl    = document.getElementById('dl-date');
    var btnEl     = document.getElementById('dl-btn');
    var noteEl    = document.getElementById('dl-note');

    function formatDate(iso) {
      if (!iso) return '—';
      return iso.split('T')[0];
    }

    function showError(msg) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.textContent = msg || '无法获取版本信息，请稍后重试。';
      // Show fallback button
      contentEl.style.display = 'block';
      btnEl.href = FALLBACK_URL;
      btnEl.innerHTML = '<svg class="icon icon-md"><use href="#i-download"/></svg> 前往 GitHub Releases 下载';
      noteEl.textContent = '将跳转到 GitHub Releases 页面';
      versionEl.textContent = '—';
      dateEl.textContent = '—';
    }

    function fetchRelease() {
      fetch(API_URL, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      })
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        var tag = data.tag_name || '—';
        var date = formatDate(data.published_at);
        var assets = data.assets || [];

        // Find .exe asset
        var exeAsset = null;
        for (var i = 0; i < assets.length; i++) {
          if (assets[i].name && assets[i].name.toLowerCase().endsWith('.exe')) {
            exeAsset = assets[i];
            break;
          }
        }

        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';

        versionEl.textContent = tag;
        dateEl.textContent = date;

        if (exeAsset && exeAsset.browser_download_url) {
          btnEl.href = exeAsset.browser_download_url;
          btnEl.innerHTML = '<svg class="icon icon-md"><use href="#i-download"/></svg> 立即下载 ' + exeAsset.name;
          noteEl.textContent = exeAsset.name + ' · ' + formatSize(exeAsset.size) + ' · 免费开源';
        } else {
          // No .exe found, fallback to releases page
          btnEl.href = FALLBACK_URL;
          btnEl.innerHTML = '<svg class="icon icon-md"><use href="#i-download"/></svg> 前往 GitHub Releases 下载';
          noteEl.textContent = '未找到 .exe 文件，请在 Releases 页面选择对应版本';
        }
      })
      .catch(function(err) {
        showError('获取版本信息失败: ' + (err.message || '网络错误'));
      });
    }

    function formatSize(bytes) {
      if (!bytes || isNaN(bytes)) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Start fetching on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fetchRelease);
    } else {
      fetchRelease();
    }
  })();
  </script>

  <!-- Cursor Glow Effect -->
  <script>
  (function() {
    'use strict';
    var mouseX = -500, mouseY = -500;
    var smoothX = -500, smoothY = -500;
    var isHoverDevice = window.matchMedia('(hover: hover)').matches;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function initCursorGlow() {
      if (!isHoverDevice) return;
      var el = document.getElementById('cursor-glow');
      if (!el) return;

      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function tick() {
        smoothX = lerp(smoothX, mouseX, 0.07);
        smoothY = lerp(smoothY, mouseY, 0.07);
        el.style.transform = 'translate(' + (smoothX - 200) + 'px, ' + (smoothY - 200) + 'px)';
        requestAnimationFrame(tick);
      }
      tick();
    }

    // ===================== 3D TILT CARD =====================
    function initTiltCard() {
      if (!isHoverDevice) return;
      var wrapper = document.querySelector('.tilt-wrapper');
      var inner = document.querySelector('.tilt-inner');
      if (!wrapper || !inner) return;

      wrapper.addEventListener('mousemove', function(e) {
        var rect = wrapper.getBoundingClientRect();
        var nx = (e.clientX - rect.left) / rect.width;
        var ny = (e.clientY - rect.top) / rect.height;
        var rx = (ny - 0.5) * -10;
        var ry = (nx - 0.5) * 10;
        inner.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
        inner.style.setProperty('--spec-x', (nx * 100) + '%');
        inner.style.setProperty('--spec-y', (ny * 100) + '%');
      });

      wrapper.addEventListener('mouseleave', function() {
        inner.style.transform = 'rotateX(0deg) rotateY(0deg)';
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        initCursorGlow();
        initTiltCard();
      });
    } else {
      initCursorGlow();
      initTiltCard();
    }

    fetch('https://api.github.com/repos/RyanTanC/HNUST-Exam-System/contributors')

        });
        container.innerHTML = html;
      })
      .catch(function() { /* 静默失败 */ });
  })();

  <script>
  (function() {
    'use strict';

    var README_URL = 'https://raw.githubusercontent.com/RyanTanC/HNUST-Exam-System/master/README.md';
    var SPEED = 8;

    var outputEl = document.getElementById('py-output');
    if (!outputEl) return;

    var lines = [];
    var lineIdx = 0, charIdx = 0;
    var curLine = null, txtNode = null, cursorEl = null;

    /* ============== Typewriter Engine ============== */

    function mkCursor() {
      var s = document.createElement('span');
      s.className = 'py-cursor-span';
      s.textContent = '█';
      return s;
    }

    function scrollDown() {
      var box = document.getElementById('py-body');
      if (box) box.scrollTop = box.scrollHeight;
    }

    function typeTick() {
      if (lineIdx >= lines.length) {
        var fin = document.createElement('div');
        fin.className = 'py-line';
        var pp = document.createElement('span'); pp.className = 'prompt'; pp.textContent = '>>> ';
        fin.appendChild(pp);
        fin.appendChild(mkCursor());
        outputEl.appendChild(fin);
        scrollDown();
        // Pause then smooth-scroll back to top with easing
        setTimeout(function() {
          var box = document.getElementById('py-body');
          if (!box) return;
          var start = box.scrollTop;
          var duration = 800;
          var startTime = null;
          function ease(t) { return 1 - Math.pow(1 - t, 3); } // cubic out
          function scroll(now) {
            if (!startTime) startTime = now;
            var elapsed = now - startTime;
            var p = Math.min(elapsed / duration, 1);
            box.scrollTop = start * (1 - ease(p));
            if (p < 1) requestAnimationFrame(scroll);
          }
          requestAnimationFrame(scroll);
        }, 1500);
        return;
      }

      var line = lines[lineIdx], text = line[0], cls = line[1];

      if (!curLine) {
        curLine = document.createElement('div');
        curLine.className = 'py-line' + (cls ? ' ' + cls : '');
        var pr = document.createElement('span'); pr.className = 'prompt'; pr.textContent = '>>> ';
        curLine.appendChild(pr);
        txtNode = document.createTextNode('');
        curLine.appendChild(txtNode);
        cursorEl = mkCursor();
        curLine.appendChild(cursorEl);
        outputEl.appendChild(curLine);
        scrollDown();
      }

      if (charIdx < text.length) {
        txtNode.appendData(text[charIdx]);
        charIdx++;
        scrollDown();
        var ch = text[charIdx - 1];
        var d = SPEED;
        if ('。：，！？；'.indexOf(ch) !== -1) d = SPEED * 6;
        else if (' ——-'.indexOf(ch) !== -1) d = SPEED * 2;
        setTimeout(typeTick, d);
      } else {
        if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
        cursorEl = null; txtNode = null;
        lineIdx++; charIdx = 0; curLine = null;
        setTimeout(typeTick, SPEED * 3);
      }
    }

    function startTyper(data) {
      lines = data;
      lineIdx = 0; charIdx = 0;
      curLine = null; txtNode = null; cursorEl = null;
      outputEl.innerHTML = '';
      setTimeout(typeTick, 400);
    }

    /* ============== Fallback Data ============== */

    var FALLBACK = [
      ["# HNUST 考试仿真平台 — 更新日志", "heading"],
      ["", ""],
      ["v1.1.1 — 2026-05-08", "version"],
      ["  🐛 修复：修复已知问题", "fix"],
      ["", ""],

      ["  🌙 深色模式：一键切换深色/浅色主题，夜间刷题更护眼", "feat"],
      ["  ⚙️ 设置面板：集中管理字体大小、主题偏好等个性化配置", "feat"],
      ["  ⚡ 即时反馈：答题后实时显示对错，无需等待交卷", "feat"],
      ["  📊 进度追踪：可视化展示各题型完成情况与得分趋势", "feat"],
      ["  🧠 题目分析（豆包）：接入 AI 智能分析，辅助理解错题思路", "feat"],
      ["  🎴 卡片动效选卷：全新试卷选择界面，搭配流畅动画效果", "feat"],
      ["  🐍 Python 环境对话框：首次使用编程题时自动检测并引导配置", "feat"],
      ["  🏆 结果页增强：考试结束后展示更详细的得分明细与知识点统计", "feat"],
      ["  🛡️ 提交确认增强：交卷前智能检测未答题目，防止误操作遗漏", "feat"],
      ["  🔄 更新提示：优化更新检测流程，新版本提醒更醒目友好", "feat"],

      ["  ✂️ 引号归一化：自动统一中英文引号格式，评分结果更准确公正", "feat"],
      ["  🧩 自定义控件：封装通用 UI 组件，界面风格统一交互更细腻", "feat"],
      ["", ""],

      ["  ✨ 实现考试、判分等核心基础功能", "feat"],
    ];

    /* ============== README Changelog Parser ============== */

    function parseChangelog(md) {
      var start = md.indexOf('## 📋 更新日志');
      if (start === -1) start = md.indexOf('## 更新日志');
      if (start === -1) return null;

      var sec = md.substring(start);
      // Find next ## (but not ###) heading or EOF
      var end = -1, pos = 1;
      while (pos < sec.length) {
        var idx = sec.indexOf('\n## ', pos);
        if (idx === -1) break;
        if (sec.charAt(idx + 4) !== '#') { end = idx; break; }
        pos = idx + 1;
      }
      if (end !== -1) sec = sec.substring(0, end);

      var result = [];
      var secLines = sec.split('\n');
      var started = false;

      for (var i = 0; i < secLines.length; i++) {
        var raw = secLines[i];
        if (!started) { if (/^##\s/.test(raw)) started = true; continue; }

        // Version: ### v1.1.1 (2026-05-08)
        var vm = raw.match(/^###\s+(v[\d.]+\S*)\s*\((\d{4}-\d{2}-\d{2})\)/);
        if (vm) {
          if (result.length > 0) result.push(['', '']);
          result.push([vm[1] + ' — ' + vm[2], 'version']);
          continue;
        }

        // Subsection: #### Title
        var sm = raw.match(/^####\s+(.+)/);
        if (sm) {
          result.push(['  ' + sm[1], 'heading']);
          continue;
        }

        // List item: - content
        var im = raw.match(/^-\s+(.+)/);
        if (im) {
          var t = im[1].replace(/\*\*(.+?)\*\*/g, '$1').replace(/`(.+?)`/g, '$1');
          var c = 'feat';
          if (/^🐛/.test(t)) c = 'fix';
          else if (/^🔥/.test(t)) c = 'major';
          else if (/^✨/.test(t) && /[优化提升]/.test(t)) c = 'opt';
          result.push(['  ' + t, c]);
          continue;
        }

        if (/^\s*$/.test(raw)) result.push(['', '']);
      }

      return result.length > 2 ? result : null;
    }

    /* ============== Fetch README & Start ============== */

    // Show brief loading indicator
    var loadEl = document.createElement('div');
    loadEl.className = 'py-line';
    loadEl.innerHTML = '<span class="prompt">>>> </span>Fetching changelog from README...';
    outputEl.appendChild(loadEl);

    fetch(README_URL)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(md) {
        var parsed = parseChangelog(md);
        if (parsed) {
          parsed.unshift(['', ''], ['# 📋 更新日志', 'heading']);
          startTyper(parsed);
        } else {
          startTyper(FALLBACK);
        }
      })
      .catch(function() {
        startTyper(FALLBACK);
      });
  })();
